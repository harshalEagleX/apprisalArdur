<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Profile')}"></head>

<body>
    <div class="app-layout">
        <!-- Dynamic sidebar based on role -->
        <th:block th:if="${user.role.name() == 'ADMIN'}" th:replace="~{fragments/layout :: sidebar-admin}"></th:block>
        <th:block th:if="${user.role.name() == 'CLIENT'}" th:replace="~{fragments/layout :: sidebar-client}"></th:block>
        <th:block th:if="${user.role.name() == 'REVIEWER'}" th:replace="~{fragments/layout :: sidebar-reviewer}">
        </th:block>

        <main class="main-content">
            <header class="page-header">
                <h1 class="page-title">Profile Settings</h1>
                <p class="page-subtitle">Manage your account information and preferences</p>
            </header>

            <div class="page-content">
                <!-- Alerts -->
                <div th:if="${success}" class="alert alert-success animate-slide-up">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                    <span th:text="${success}">Success message</span>
                </div>
                <div th:if="${error}" class="alert alert-error animate-slide-up">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <span th:text="${error}">Error message</span>
                </div>

                <div class="profile-grid">
                    <!-- Profile Card -->
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">Account Information</h3>
                        </div>
                        <div class="card-body">
                            <div class="profile-header">
                                <div class="profile-avatar" th:text="${user.username.substring(0, 1).toUpperCase()}">U
                                </div>
                                <div class="profile-info">
                                    <h2 th:text="${user.fullName != null} ? ${user.fullName} : ${user.username}">User
                                        Name</h2>
                                    <span class="badge"
                                        th:classappend="${user.role.name() == 'ADMIN'} ? 'badge-info' : (${user.role.name() == 'REVIEWER'} ? 'badge-warning' : 'badge-success')"
                                        th:text="${user.role}">ROLE</span>
                                </div>
                            </div>

                            <form th:action="@{/profile}" method="post" class="mt-xl">
                                <div class="form-group">
                                    <label class="form-label">Username</label>
                                    <input type="text" class="form-input" th:value="${user.username}" disabled>
                                    <p class="text-xs text-muted mt-sm">Username cannot be changed</p>
                                </div>

                                <div class="form-group">
                                    <label class="form-label" for="email">Email</label>
                                    <input type="email" id="email" name="email" class="form-input"
                                        th:value="${user.email}" placeholder="your@email.com">
                                </div>

                                <div class="form-group">
                                    <label class="form-label" for="fullName">Full Name</label>
                                    <input type="text" id="fullName" name="fullName" class="form-input"
                                        th:value="${user.fullName}" placeholder="Your full name">
                                </div>

                                <div class="form-group" th:if="${user.client != null}">
                                    <label class="form-label">Organization</label>
                                    <input type="text" class="form-input" th:value="${user.client.name}" disabled>
                                </div>

                                <button type="submit" class="btn btn-primary">
                                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M5 13l4 4L19 7" />
                                    </svg>
                                    Save Changes
                                </button>
                            </form>
                        </div>
                    </div>

                    <!-- Change Password Card -->
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">Change Password</h3>
                        </div>
                        <div class="card-body">
                            <form th:action="@{/profile/password}" method="post">
                                <div class="form-group">
                                    <label class="form-label" for="currentPassword">Current Password</label>
                                    <input type="password" id="currentPassword" name="currentPassword"
                                        class="form-input" required>
                                </div>

                                <div class="form-group">
                                    <label class="form-label" for="newPassword">New Password</label>
                                    <input type="password" id="newPassword" name="newPassword" class="form-input"
                                        required minlength="8">
                                    <p class="text-xs text-muted mt-sm">Minimum 8 characters</p>
                                </div>

                                <div class="form-group">
                                    <label class="form-label" for="confirmPassword">Confirm New Password</label>
                                    <input type="password" id="confirmPassword" name="confirmPassword"
                                        class="form-input" required>
                                </div>

                                <button type="submit" class="btn btn-secondary">
                                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                                    </svg>
                                    Update Password
                                </button>
                            </form>
                        </div>
                    </div>

                    <!-- Account Stats Card -->
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">Account Statistics</h3>
                        </div>
                        <div class="card-body">
                            <div class="stat-list">
                                <div class="stat-list-item">
                                    <span class="text-muted">Member Since</span>
                                    <span
                                        th:text="${user.createdAt != null} ? ${#temporals.format(user.createdAt, 'MMMM dd, yyyy')} : 'N/A'">Jan
                                        01, 2025</span>
                                </div>
                                <div class="stat-list-item">
                                    <span class="text-muted">Last Updated</span>
                                    <span
                                        th:text="${user.updatedAt != null} ? ${#temporals.format(user.updatedAt, 'MMMM dd, yyyy')} : 'N/A'">Jan
                                        01, 2025</span>
                                </div>
                                <div class="stat-list-item">
                                    <span class="text-muted">Account Status</span>
                                    <span class="badge badge-success">Active</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <style>
        .profile-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-lg);
        }

        @media (max-width: 1024px) {
            .profile-grid {
                grid-template-columns: 1fr;
            }
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: var(--spacing-lg);
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            background: var(--color-accent-gradient);
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--font-size-3xl);
            font-weight: 700;
        }

        .profile-info h2 {
            font-size: var(--font-size-xl);
            margin-bottom: var(--spacing-xs);
        }

        .stat-list {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
        }

        .stat-list-item {
            display: flex;
            justify-content: space-between;
            padding: var(--spacing-sm) 0;
            border-bottom: 1px solid var(--color-border);
        }

        .stat-list-item:last-child {
            border-bottom: none;
        }
    </style>

    <script src="/js/main.js"></script>
</body>

</html>
