<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Completed Reviews')}"></head>

<body>
    <div class="app-layout">
        <th:block th:replace="~{fragments/layout :: sidebar-reviewer}"></th:block>

        <main class="main-content">
            <header class="page-header">
                <h1 class="page-title">Completed Reviews</h1>
                <p class="page-subtitle">Batches you have successfully reviewed</p>
            </header>

            <div class="page-content">
                <!-- Stats -->
                <div class="stat-grid mb-xl">
                    <div class="stat-card animate-slide-up">
                        <div class="stat-icon" style="background: rgba(16, 185, 129, 0.2);">
                            <svg width="24" height="24" fill="none" stroke="var(--color-success)" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                        </div>
                        <div class="stat-value" th:text="${batches.size()}">0</div>
                        <div class="stat-label">Total Completed</div>
                    </div>
                </div>

                <!-- Completed Batches Table -->
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Completed Batches</h3>
                    </div>
                    <div class="table-container">
                        <table class="table" id="completedTable">
                            <thead>
                                <tr>
                                    <th data-sortable="batchId">Batch ID</th>
                                    <th>Client</th>
                                    <th>Files</th>
                                    <th data-sortable="date">Completed</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="batch : ${batches}" class="animate-fade-in">
                                    <td>
                                        <div class="flex items-center gap-sm"
                                            style="display: flex; align-items: center; gap: 8px;">
                                            <svg width="16" height="16" fill="none" stroke="var(--color-success)"
                                                viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                    d="M5 13l4 4L19 7" />
                                            </svg>
                                            <span class="font-medium" th:text="${batch.parentBatchId}">BATCH_001</span>
                                        </div>
                                    </td>
                                    <td th:text="${batch.client.name}">Client Name</td>
                                    <td th:text="${batch.files.size()}">0</td>
                                    <td th:text="${#temporals.format(batch.updatedAt, 'MMM dd, yyyy HH:mm')}">Jan 01,
                                        2025</td>
                                    <td>
                                        <a th:href="@{/reviewer/batches/{id}(id=${batch.id})}"
                                            class="btn btn-secondary btn-sm">
                                            <svg width="14" height="14" fill="none" stroke="currentColor"
                                                viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                            </svg>
                                            View
                                        </a>
                                    </td>
                                </tr>
                                <tr th:if="${batches.isEmpty()}">
                                    <td colspan="5" class="text-center text-muted py-xl">
                                        <svg width="48" height="48" fill="none" stroke="currentColor"
                                            viewBox="0 0 24 24" style="margin: 0 auto 16px; opacity: 0.3;">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                                        </svg>
                                        <p>No completed reviews yet.</p>
                                        <p class="text-sm">Complete your first review to see it here.</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Table.makeSortable('completedTable');
        });
    </script>
</body>

</html>
