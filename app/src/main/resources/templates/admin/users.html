<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('User Management')}"></head>

<body>
    <div class="app-layout">
        <th:block th:replace="~{fragments/layout :: sidebar-admin}"></th:block>

        <main class="main-content">
            <header class="page-header flex justify-between items-center">
                <div>
                    <h1 class="page-title">User Management</h1>
                    <p class="page-subtitle">Create, edit, and manage platform users</p>
                </div>
                <button class="btn btn-primary" onclick="openModal('createUserModal')">
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                    Add User
                </button>
            </header>

            <div class="page-content">
                <!-- Alerts -->
                <div th:if="${success}" class="alert alert-success animate-slide-up">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                    <span th:text="${success}">Success message</span>
                </div>
                <div th:if="${error}" class="alert alert-error animate-slide-up">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <span th:text="${error}">Error message</span>
                </div>

                <!-- Users Table -->
                <div class="card">
                    <div class="table-container">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>User</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th>Client</th>
                                    <th>Created</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="u : ${users}">
                                    <td>
                                        <div class="flex items-center gap-sm">
                                            <div class="user-avatar"
                                                th:text="${u.username.substring(0, 1).toUpperCase()}">U</div>
                                            <div>
                                                <div class="font-medium"
                                                    th:text="${u.fullName != null} ? ${u.fullName} : ${u.username}">User
                                                    Name</div>
                                                <div class="text-sm text-muted" th:text="${u.username}">username</div>
                                            </div>
                                        </div>
                                    </td>
                                    <td th:text="${u.email != null} ? ${u.email} : '-'">email@example.com</td>
                                    <td>
                                        <span class="badge"
                                            th:classappend="${u.role.name() == 'ADMIN'} ? 'badge-info' : (${u.role.name() == 'REVIEWER'} ? 'badge-warning' : 'badge-success')"
                                            th:text="${u.role}">ROLE</span>
                                    </td>
                                    <td th:text="${u.client != null} ? ${u.client.name} : '-'">Client Name</td>
                                    <td
                                        th:text="${u.createdAt != null} ? ${#temporals.format(u.createdAt, 'MMM dd, yyyy')} : '-'">
                                        Jan 01, 2025</td>
                                    <td>
                                        <div class="flex gap-sm">
                                            <button class="btn btn-secondary btn-sm edit-user-btn" th:data-id="${u.id}"
                                                th:data-email="${u.email}" th:data-fullname="${u.fullName}"
                                                th:data-role="${u.role}"
                                                th:data-clientid="${u.client != null} ? ${u.client.id} : ''">
                                                Edit
                                            </button>
                                            <form th:action="@{/admin/users/{id}/delete(id=${u.id})}" method="post"
                                                onsubmit="return confirm('Are you sure you want to delete this user?')">
                                                <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                                <tr th:if="${users.empty}">
                                    <td colspan="6" class="text-center text-muted">No users found</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Pagination -->
                    <div th:if="${users.totalPages > 1}" class="card-footer flex justify-between items-center">
                        <div class="text-sm text-muted">
                            Showing page <span th:text="${users.number + 1}">1</span> of <span
                                th:text="${users.totalPages}">1</span>
                        </div>
                        <div class="flex gap-sm">
                            <a th:href="@{/admin/users(page=${users.number - 1})}"
                                th:class="${users.first} ? 'btn btn-secondary btn-sm disabled' : 'btn btn-secondary btn-sm'">
                                Previous
                            </a>
                            <a th:href="@{/admin/users(page=${users.number + 1})}"
                                th:class="${users.last} ? 'btn btn-secondary btn-sm disabled' : 'btn btn-secondary btn-sm'">
                                Next
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Create User Modal -->
    <div id="createUserModal" class="modal-overlay" onclick="closeModalOnOverlay(event, 'createUserModal')">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Create New User</h3>
                <button class="modal-close" onclick="closeModal('createUserModal')">&times;</button>
            </div>
            <form th:action="@{/admin/users/create}" method="post">
                <div class="modal-body">
                    <div class="form-group">
                        <label class="form-label" for="username">Username *</label>
                        <input type="text" id="username" name="username" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="password">Password *</label>
                        <input type="password" id="password" name="password" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="email">Email</label>
                        <input type="email" id="email" name="email" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="fullName">Full Name</label>
                        <input type="text" id="fullName" name="fullName" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="role">Role *</label>
                        <select id="role" name="role" class="form-input form-select" required>
                            <option th:each="r : ${roles}" th:value="${r}" th:text="${r}">ROLE</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="clientId">Client Organization</label>
                        <select id="clientId" name="clientId" class="form-input form-select">
                            <option value="">-- None --</option>
                            <option th:each="c : ${clients}" th:value="${c.id}" th:text="${c.name}">Client</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary"
                        onclick="closeModal('createUserModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create User</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit User Modal -->
    <div id="editUserModal" class="modal-overlay" onclick="closeModalOnOverlay(event, 'editUserModal')">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Edit User</h3>
                <button class="modal-close" onclick="closeModal('editUserModal')">&times;</button>
            </div>
            <form id="editUserForm" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <div class="modal-body">
                    <div class="form-group">
                        <label class="form-label" for="editEmail">Email</label>
                        <input type="email" id="editEmail" name="email" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="editFullName">Full Name</label>
                        <input type="text" id="editFullName" name="fullName" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="editRole">Role *</label>
                        <select id="editRole" name="role" class="form-input form-select" required>
                            <option th:each="r : ${roles}" th:value="${r}" th:text="${r}">ROLE</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="editClientId">Client Organization</label>
                        <select id="editClientId" name="clientId" class="form-input form-select">
                            <option value="">-- None --</option>
                            <option th:each="c : ${clients}" th:value="${c.id}" th:text="${c.name}">Client</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary"
                        onclick="closeModal('editUserModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function openModal(id) {
            document.getElementById(id).classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function closeModalOnOverlay(event, id) {
            if (event.target.classList.contains('modal-overlay')) {
                closeModal(id);
            }
        }

        function openEditModal(userId, email, fullName, role, clientId) {
            document.getElementById('editUserForm').action = '/admin/users/' + userId + '/update';
            document.getElementById('editEmail').value = email !== 'null' ? email : '';
            document.getElementById('editFullName').value = fullName !== 'null' ? fullName : '';
            document.getElementById('editRole').value = role;
            document.getElementById('editClientId').value = clientId || '';
            openModal('editUserModal');
        }

        // Close modal on Escape key
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal-overlay.active').forEach(modal => {
                    modal.classList.remove('active');
                });
            }
        });

        // Edit button click handler using data attributes
        document.addEventListener('DOMContentLoaded', function () {
            document.querySelectorAll('.edit-user-btn').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    var userId = this.getAttribute('data-id');
                    var email = this.getAttribute('data-email') || '';
                    var fullName = this.getAttribute('data-fullname') || '';
                    var role = this.getAttribute('data-role');
                    var clientId = this.getAttribute('data-clientid') || '';
                    openEditModal(userId, email, fullName, role, clientId);
                });
            });
        });
    </script>
</body>

</html>
