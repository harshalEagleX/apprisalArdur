<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Batch Details')}"></head>

<body>
    <div class="app-layout">
        <th:block th:replace="~{fragments/layout :: sidebar-admin}"></th:block>

        <main class="main-content">
            <header class="page-header">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <h1 class="page-title" th:text="${batch.parentBatchId}">BATCH_001</h1>
                        <p class="page-subtitle">
                            <span th:text="${batch.client.name}">Client Name</span> •
                            Created <span th:text="${#temporals.format(batch.createdAt, 'MMM dd, yyyy HH:mm')}">Jan 01,
                                2025</span>
                        </p>
                    </div>
                    <div class="flex gap-sm">
                        <a href="/admin/batches" class="btn btn-secondary">
                            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                            </svg>
                            Back
                        </a>
                        <form th:if="${batch.status.name() == 'OCR_PENDING' || batch.status.name() == 'OCR_COMPLETED'}"
                            th:action="@{/admin/batches/{id}/process-qc(id=${batch.id})}" method="post"
                            style="display: inline;">
                            <button type="submit" class="btn btn-primary">
                                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                                </svg>
                                Process QC
                            </button>
                        </form>
                        <form th:action="@{/admin/batches/{id}/delete(id=${batch.id})}" method="post"
                            style="display: inline;"
                            onsubmit="return confirm('Are you sure you want to delete this batch? This action cannot be undone.');">
                            <button type="submit" class="btn btn-danger">
                                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                </svg>
                                Delete
                            </button>
                        </form>
                    </div>
                </div>
            </header>

            <div class="page-content">
                <!-- Batch Info Cards -->
                <div class="stat-grid" style="margin-bottom: 2rem;">
                    <div class="stat-card">
                        <div class="stat-icon">
                            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                            </svg>
                        </div>
                        <div class="stat-value" th:text="${batch.files.size()}">0</div>
                        <div class="stat-label">Total Files</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: rgba(16, 185, 129, 0.2);">
                            <svg width="24" height="24" fill="none" stroke="var(--color-success)" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M5 13l4 4L19 7" />
                            </svg>
                        </div>
                        <div class="stat-value" th:text="${#lists.size(batch.files.?[status.name() == 'COMPLETED'])}">0
                        </div>
                        <div class="stat-label">Completed</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: rgba(245, 158, 11, 0.2);">
                            <svg width="24" height="24" fill="none" stroke="var(--color-warning)" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                        </div>
                        <div class="stat-value" th:text="${#lists.size(batch.files.?[status.name() == 'PENDING'])}">0
                        </div>
                        <div class="stat-label">Pending</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">
                            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                        </div>
                        <div class="stat-value"
                            th:text="${batch.assignedReviewer != null} ? ${batch.assignedReviewer.username} : 'Unassigned'">
                            -</div>
                        <div class="stat-label">Reviewer</div>
                    </div>
                </div>

                <!-- Status Badge -->
                <div class="card" style="margin-bottom: 2rem;">
                    <div class="card-body">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <h4>Status</h4>
                                <span class="badge"
                                    th:classappend="${batch.status.name() == 'COMPLETED'} ? 'badge-success' : (${batch.status.name().contains('ERROR') || batch.status.name().contains('FAILED')} ? 'badge-error' : (${batch.status.name().contains('REVIEW')} ? 'badge-warning' : 'badge-info'))"
                                    th:text="${batch.status}">STATUS</span>
                            </div>
                            <div>
                                <small class="text-muted">Last Updated: <span
                                        th:text="${#temporals.format(batch.updatedAt, 'MMM dd, yyyy HH:mm')}">-</span></small>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Files Table -->
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Files</h3>
                    </div>
                    <div class="table-container">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Filename</th>
                                    <th>Type</th>
                                    <th>Order ID</th>
                                    <th>Status</th>
                                    <th>Size</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="file : ${batch.files}">
                                    <td>
                                        <span class="font-medium" th:text="${file.filename}">file.pdf</span>
                                    </td>
                                    <td>
                                        <span class="badge badge-neutral" th:text="${file.fileType}">APPRAISAL</span>
                                    </td>
                                    <td th:text="${file.orderId != null} ? ${file.orderId} : '-'">-</td>
                                    <td>
                                        <span class="badge"
                                            th:classappend="${file.status.name() == 'COMPLETED'} ? 'badge-success' : (${file.status.name() == 'ERROR'} ? 'badge-error' : 'badge-info')"
                                            th:text="${file.status}">PENDING</span>
                                    </td>
                                    <td
                                        th:text="${file.fileSize != null} ? ${#numbers.formatDecimal(file.fileSize / 1024.0, 0, 1)} + ' KB' : '-'">
                                        -</td>
                                </tr>
                                <tr th:if="${batch.files.empty}">
                                    <td colspan="5" class="text-center text-muted">No files in this batch</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
