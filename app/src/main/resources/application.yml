spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ardurApprisal}
    username: ${DB_USERNAME:harshalsmac}
    password: ${DB_PASSWORD:12345678}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: create   # 🔥 IMPORTANT: Hibernate will manage schema
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    show-sql: false
    open-in-view: false

  # ❌ REMOVE FLYWAY COMPLETELY
  flyway:
    enabled: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

  session:
    cookie:
      http-only: true
      secure: ${COOKIE_SECURE:false}
      same-site: strict

app:
  admin:
    username: ${ADMIN_EMAIL:dhoteharshal16@gmail.com}
    password: ${ADMIN_PASSWORD:Admin123!}

  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

  storage:
    path: ${STORAGE_PATH:./uploads}

  api-key:
    python-service: ${PYTHON_API_KEY:}

# IMPORTANT: Use 127.0.0.1, not "localhost".
# On macOS/Linux "localhost" often resolves to ::1 (IPv6) while uvicorn
# listens only on 127.0.0.1 (IPv4) → silent connection failure with zero Python logs.
# Start Python with: uvicorn main:app --host 0.0.0.0 --port 5001 --reload
ocr:
  service:
    url: ${OCR_SERVICE_URL:http://127.0.0.1:5001}
    timeout-seconds: ${OCR_TIMEOUT:180}
    retry-attempts: ${OCR_RETRIES:2}

qc:
  enabled: true
  auto-process-on-upload: false
  reconciler:
    enabled: ${QC_RECONCILER_ENABLED:true}
    retry-after-minutes: ${QC_RECONCILER_RETRY_MINUTES:15}
    abandon-after-minutes: ${QC_RECONCILER_ABANDON_MINUTES:90}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.apprisal: INFO
    org.hibernate.SQL: WARN
    org.springframework.security: WARN