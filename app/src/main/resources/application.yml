spring:
  config:
    import: optional:file:.env[.properties]

  jackson:
    time-zone: Asia/Kolkata

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ardurApprisal}
    username: ${DB_USERNAME:harshalsmac}
    password: ${DB_PASSWORD:12345678}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-init-sql: SET TIME ZONE 'Asia/Kolkata'

  jpa:
    hibernate:
      ddl-auto: update   # 🔥 IMPORTANT: Hibernate will manage schema
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: Asia/Kolkata
          # Without batching, the post-Python save inserts ~138 QCRuleResult rows
          # plus their Envers audit rows one-by-one — ~50-60s on the live system.
          # batch_size collapses those into multiplexed multi-row INSERTs.
          batch_size: 50
        order_inserts: true
        order_updates: true
        format_sql: false
    show-sql: false
    open-in-view: false

  # ❌ REMOVE FLYWAY COMPLETELY
  flyway:
    enabled: false

  servlet:
    multipart:
      enabled: true
      max-file-size: ${MAX_UPLOAD_FILE_SIZE:25MB}
      max-request-size: ${MAX_UPLOAD_REQUEST_SIZE:25MB}

server:
  tomcat:
    basedir: ${TOMCAT_BASEDIR:/private/tmp/apprisal-tomcat}

  session:
    cookie:
      http-only: true
      secure: ${COOKIE_SECURE:false}
      same-site: strict

app:
  admin:
    username: ${ADMIN_EMAIL:dhoteharshal16@gmail.com}
    password: ${ADMIN_PASSWORD:Admin123!}

  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

  storage:
    path: ${STORAGE_PATH:./uploads}

  api-key:
    # Must match PYTHON_API_KEY in ocr-service/.env
    # Dev default matches the value set in ocr-service/.env
    python-service: ${PYTHON_API_KEY:apprisal-local-dev-key}

# IMPORTANT: Use 127.0.0.1, not "localhost".
# On macOS/Linux "localhost" often resolves to ::1 (IPv6) while uvicorn
# listens only on 127.0.0.1 (IPv4) → silent connection failure with zero Python logs.
# Start Python with: uvicorn main:app --host 0.0.0.0 --port 5001 --reload
ocr:
  service:
    url: ${OCR_SERVICE_URL:http://127.0.0.1:5001}
    timeout-seconds: ${OCR_TIMEOUT:180}
    retry-attempts: ${OCR_RETRIES:2}
    # FIX: was missing — OcrServiceConfig binds to ocr.service.api-key (not app.api-key.python-service)
    # Default matches Python's .env so dev works without setting the env var explicitly
    api-key: ${PYTHON_API_KEY:apprisal-local-dev-key}

qc:
  enabled: true
  auto-process-on-upload: false
  reconciler:
    enabled: ${QC_RECONCILER_ENABLED:true}
    retry-after-minutes: ${QC_RECONCILER_RETRY_MINUTES:15}
    abandon-after-minutes: ${QC_RECONCILER_ABANDON_MINUTES:90}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.apprisal: INFO
    org.hibernate.SQL: WARN
    org.springframework.security: WARN
