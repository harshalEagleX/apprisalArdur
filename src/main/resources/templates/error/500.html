<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Server Error')}"></head>

<body>
    <div class="error-container">
        <div class="error-card animate-fade-in">
            <div class="error-icon error-500">
                <svg width="64" height="64" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>
            <h1 class="error-code">500</h1>
            <h2 class="error-title">Something Went Wrong</h2>
            <p class="error-message">
                We're experiencing technical difficulties. Our team has been notified
                and is working to resolve the issue. Please try again later.
            </p>
            <div class="error-actions">
                <a href="javascript:location.reload()" class="btn btn-secondary">
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                    Try Again
                </a>
                <a th:href="@{/}" class="btn btn-primary">
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>
                    Home
                </a>
            </div>
            <div class="error-details mt-xl" th:if="${timestamp}">
                <p class="text-xs text-muted">
                    Error ID: <code th:text="${timestamp}">timestamp</code>
                </p>
            </div>
        </div>
    </div>

    <style>
        .error-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-lg);
        }

        .error-card {
            text-align: center;
            max-width: 500px;
            padding: var(--spacing-2xl);
        }

        .error-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto var(--spacing-xl);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error-500 {
            background: rgba(239, 68, 68, 0.15);
            color: var(--color-error);
            animation: pulse 2s infinite;
        }

        .error-code {
            font-size: 6rem;
            font-weight: 700;
            background: var(--color-accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: var(--spacing-sm);
        }

        .error-title {
            font-size: var(--font-size-2xl);
            margin-bottom: var(--spacing-md);
        }

        .error-message {
            color: var(--color-text-secondary);
            margin-bottom: var(--spacing-xl);
        }

        .error-actions {
            display: flex;
            gap: var(--spacing-md);
            justify-content: center;
        }

        .error-details code {
            background: var(--color-bg-tertiary);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: var(--font-size-xs);
        }
    </style>
</body>

</html>
